<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Messenger — Conversation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Matemasie&display=swap"
      rel="stylesheet"
    />
    <style>
      /*
        Classic messenger look — tinted to Quick Draw / Match Preview palette.
        Headings: Matemasie (https://fonts.google.com/specimen/Matemasie).
        Body UI: Caveat (https://fonts.google.com/specimen/Caveat).
      */

      :root {
        --font-heading: "Matemasie", system-ui, sans-serif;
        --font-body: "Gochi Hand", system-ui, sans-serif;
        /* Match style.css / MatchPreviewPage palette */
        --blue: #07279a;
        --pink: #d54aa9;
        --paper: #f4efff;
        --paper-2: #ece4ff;
        --ink: #07279a;
        --ink-soft: #3f4f9a;
        --gold: #d54aa9;
        --green: #a9b8f2;

        --sky: #e6dcff;
        --sky-deep: #ddd4f0;
        --sky-edge: #b5a3d6;
        --menu: #f2ecff;
        --surface: var(--sky);
        --surface-deep: var(--sky-deep);
        --xp-blue: var(--blue);
        --win-bg: var(--sky);
        --win-border-outer: #9a88c4;
        --win-border: var(--blue);
        --menu-bg: var(--menu);
        --inset-dark: #808080;
        --inset-light: #ffffff;
        --text: var(--ink);
        --read: var(--blue);
        --unread: var(--pink);
        --history-bg: #ffffff;
        --warn-bg: #fffacd;
        --toolbar-icon-size: 48px;
        --profile-col-width: 170px;
        --split-gap: 10px;
        --wlm-purple-top: #f0e8ff;
        --wlm-purple-mid: var(--green);
        --wlm-purple-bot: var(--ink-soft);
        --wave: radial-gradient(ellipse 90% 70% at 30% 25%, rgba(255, 255, 255, 0.55) 0%, transparent 58%);
        --wave2: radial-gradient(ellipse 80% 60% at 85% 75%, rgba(255, 255, 255, 0.42) 0%, transparent 52%);
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
        letter-spacing: 0.1em;
      }

      body {
        height: 100dvh;
        min-height: 100dvh;
        margin: 0;
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 14.5px;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, #d54aa938 0%, #ffffff00 42%),
          radial-gradient(circle at 85% 12%, #07279a33 0%, #ffffff00 45%),
          var(--paper-2);
        display: flex;
        flex-direction: column;
      }

      button,
      input,
      textarea,
      select {
        font-family: inherit;
        letter-spacing: inherit;
      }

      /* Full-viewport panel */
      .chat-window {
        flex: 1 1 0;
        display: flex;
        flex-direction: column;
        width: 100%;
        min-height: 0;
        background: var(--paper);
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
      }

      /* Match MatchPreviewPage .topbar + .match-section h2 */
      .title-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.35rem 0.8rem;
        background: #f0e8ff;
        border-bottom: 3px solid var(--ink);
        color: var(--ink);
        font-weight: 700;
        letter-spacing: 0.1em;
        user-select: none;
        font-size: 14.2px;
      }

      .title-bar .title-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex: 1;
      }

      .title-bar .title-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .title-bar .title-right .back-btn {
        height: 28px;
        padding: 0 12px;
        border: 2px solid var(--ink);
        border-radius: 12px;
        background: var(--blue);
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        transition: background-color 0.14s ease, transform 0.14s ease;
      }

      .title-bar .title-right .back-btn:hover {
        background: var(--pink);
        transform: translate(-1px, -1px);
      }

      .title-bar .title-right .back-btn:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 2px;
      }

      .title-bar span.title-text {
        font-family: var(--font-heading);
        font-weight: 400;
        font-size: clamp(1.35rem, 3.2vw, 2rem);
        letter-spacing: 0.04em;
        text-transform: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .title-logo {
        display: block;
        height: clamp(34px, 5vw, 46px);
        width: auto;
        max-width: 320px;
        object-fit: contain;
      }

      .chat-window.is-maximized {
        position: fixed;
        inset: 0;
        z-index: 10000;
        max-height: 100dvh;
        width: 100%;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
      }

      body.chat-maximized {
        overflow: hidden;
      }

      .chat-window.is-minimized .main-split {
        display: none !important;
      }

      .main-split {
        flex: 1;
        display: flex;
        min-height: 0;
        background: var(--wave), var(--wave2), linear-gradient(175deg, #e6eef8 0%, var(--sky) 60%);
      }

      /* Sidebar: threads */
      .sidebar {
        width: 260px;
        flex: 0 0 260px;
        border-right: 1px solid var(--sky-edge);
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: var(--wave), linear-gradient(180deg, #eaf1fa 0%, var(--sky) 100%);
      }

      .avatar {
        flex-shrink: 0;
        border: 1px solid #888;
      }

      .thread-list-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        /* Inset the whole thread column (including scrollbar) from the sidebar edges. WebKit paints
           the scrollbar in the gutter, so padding on .thread-scroll alone does not gap the pane border. */
        padding: 8px 5px;
        background: var(--wave2), linear-gradient(180deg, var(--sky) 0%, #cad8ea 100%);
      }

      /* Scrollbar only for the online/offline thread lists (not chat history or other panes). */
      .thread-scroll {
        flex: 1;
        min-height: 0;
        overflow-x: hidden;
        /* Classic scrollbar slot — overlay scrollbars stay visible better than overflow:auto alone */
        overflow-y: scroll;
        padding-left: 0;
        padding-right: 0;
        scrollbar-width: thin;
        scrollbar-color: rgba(72, 92, 152, 0.95) rgba(255, 255, 255, 0.55);
      }

      .thread-scroll::-webkit-scrollbar {
        width: 8px;
      }

      .thread-scroll::-webkit-scrollbar-track {
        /* Gap between thread lists and track (left); wrap padding-right gaps track from .chat-pane */
        margin: 2px 0 2px 5px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 3px;
      }

      .thread-scroll::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(120, 138, 200, 0.95), rgba(88, 108, 168, 0.9));
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .thread-scroll::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(100, 118, 185, 1), rgba(72, 92, 152, 0.95));
      }

      .thread-section {
        font-family: var(--font-heading);
        font-weight: 400;
        font-size: 12.5px;
        margin: 6px 0 4px 4px;
        padding-right: 5px;
        letter-spacing: 0.06em;
        color: var(--ink-soft);
      }

      .thread-section .count {
        font-weight: 400;
        color: var(--ink-soft);
      }

      .sidebar-brand {
        padding: 8px 10px;
        border-top: 1px solid var(--sky-edge);
        background: linear-gradient(180deg, #eef3fa 0%, var(--sky-deep) 100%);
        text-align: center;
        font-size: 10.3px;
        color: var(--ink-soft);
      }

      .sidebar-brand .net {
        font-weight: 700;
        color: var(--ink-soft);
      }

      .thread-list {
        list-style: none;
        margin: 0;
        padding: 0;
        background-color: #fff;
        border: 1px solid;
        border-color: var(--inset-dark) var(--inset-light) var(--inset-light) var(--inset-dark);
      }

      .thread {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        padding: 5px 6px;
        cursor: pointer;
        border-bottom: 1px solid #e0e0e0;
      }

      .thread:last-child {
        border-bottom: 0;
      }

      .thread:hover {
        background: rgba(169, 184, 242, 0.38);
      }

      .thread.is-active {
        background: #a9b8f2;
        color: var(--ink);
      }

      .thread.is-active .thread-body .name {
        color: var(--ink);
      }

      .thread.is-active .preview,
      .thread.is-active .sub {
        color: var(--ink);
      }

      .status-dot {
        width: 14px;
        height: 14px;
        margin-top: 1px;
        flex-shrink: 0;
        border-radius: 2px;
        background: var(--read);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.15);
      }

      .status-dot.unread {
        background: var(--unread);
      }

      .thread-body {
        min-width: 0;
      }

      .thread-row-top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
      }

      .thread-body .name {
        font-weight: 700;
        font-size: 12.3px;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .thread-body .thread-time {
        flex-shrink: 0;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      .thread.is-active .thread-body .thread-time {
        color: var(--ink);
      }

      .thread-body .preview {
        font-size: 12.3px;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .thread-body .sub {
        font-size: 11.3px;
        color: var(--ink-soft);
        font-style: italic;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Main chat pane — sky panel */
      .chat-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        background: var(--wave), linear-gradient(195deg, #e4edf8 0%, var(--sky) 45%);
      }

      .chat-header {
        padding: 0.35rem 0.8rem 0.5rem;
        background: #f0e8ff;
        border-bottom: 3px solid var(--ink);
        font-size: 13px;
      }

      .chat-header .to-line {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 0 6px;
        font-weight: 700;
        color: var(--ink);
      }

      .chat-header .to-prefix {
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .chat-header .to-name {
        font-family: var(--font-heading);
        font-size: clamp(1.35rem, 3.2vw, 2rem);
        font-weight: 400;
        letter-spacing: 0.04em;
        color: var(--ink);
      }

      .chat-header .to-email {
        display: block;
        margin-top: 3px;
        font-size: 11px;
        font-weight: 400;
        color: var(--ink-soft);
      }

      .warn-bar {
        margin: 10px 12px 0;
        padding: 8px 10px;
        background: var(--warn-bg);
        border: 1px solid #e8dc82;
        border-radius: 2px;
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 13.3px;
        line-height: 1.45;
        color: var(--ink);
        min-height: 34px;
      }

      .warn-bar #warnText {
        flex: 1;
        min-width: 0;
        display: block;
      }

      .warn-bar .i {
        font-weight: 900;
        color: #fff;
        background: var(--blue);
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 11px;
        flex-shrink: 0;
      }

      .chat-body {
        flex: 1;
        display: flex;
        min-height: 0;
        padding: 10px 12px;
        gap: var(--split-gap);
        background: transparent;
      }

      .history {
        flex: 1;
        background-color: var(--history-bg);
        border: 1px solid;
        border-color: var(--inset-dark) var(--inset-light) var(--inset-light) var(--inset-dark);
        border-radius: 2px;
        box-shadow: inset 1px 1px 0 rgba(0, 0, 0, 0.08);
        overflow: auto;
        padding: 10px 12px;
        font-size: 13.3px;
        line-height: 1.55;
        color: var(--ink);
      }

      .msg {
        margin-bottom: 8px;
        color: var(--ink);
      }

      .msg .who {
        font-weight: 700;
        color: var(--ink-soft);
      }

      .msg.me-line .who {
        color: var(--pink);
      }

      .msg.sys {
        font-style: italic;
        color: var(--ink-soft);
      }

      .file-attach {
        display: inline-grid;
        gap: 6px;
        margin-left: 6px;
        padding: 0;
        max-width: min(360px, 65vw);
        vertical-align: middle;
      }

      .file-attach a.file-link {
        display: inline-block;
        text-decoration: none;
        border: 0;
        color: inherit;
      }

      .file-thumb {
        width: 75px;
        height: 75px;
        background: #f6f6f6;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .file-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .file-group {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-left: 6px;
        vertical-align: middle;
        max-width: min(520px, 70vw);
      }

      .file-thumb .ext {
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
        padding: 0 4px;
        text-align: center;
        line-height: 1.1;
      }

      .dp-column {
        width: var(--profile-col-width);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding: 8px 6px 10px;
        align-self: stretch;
        background: linear-gradient(180deg, #eef3fa 0%, #c7d5ea 100%);
        border: 1px solid #8fa8c4;
        border-radius: 8px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.75),
          0 1px 0 rgba(0, 0, 0, 0.06);
      }

      .dp-pic {
        width: 150px;
        height: 150px;
        display: block;
        border: 1px solid;
        border-color: var(--inset-dark) var(--inset-light) var(--inset-light) var(--inset-dark);
        border-radius: 0;
        background: #ffffff;
        object-fit: cover;
        object-position: center;
        box-shadow:
          inset 1px 1px 0 rgba(0, 0, 0, 0.08),
          inset -1px -1px 0 rgba(255, 255, 255, 0.75);
      }

      .dp-pic.them {
        outline: 1px solid rgba(7, 39, 154, 0.55);
        outline-offset: -2px;
      }

      .profile-link {
        display: inline-block;
        text-decoration: none;
        color: inherit;
      }

      .profile-link-btn {
        appearance: none;
        padding: 0;
        margin: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
      }

      .profile-link:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 3px;
      }

      .profile-link-btn:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 3px;
      }

      .profile-link-btn:hover .dp-pic {
        outline-color: rgba(213, 74, 169, 0.75);
      }

      .modal-backdrop[hidden] {
        display: none;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 20000;
        background: rgba(0, 0, 0, 0.55);
        display: grid;
        place-items: center;
        --modal-pad-y: 12px;
        padding: var(--modal-pad-y) 0;
      }

      .modal-panel {
        width: auto;
        max-width: 100vw;
        max-height: calc(100vh - (var(--modal-pad-y) * 2));
        overflow: visible;
        background: transparent;
        border: 0;
        box-shadow: none;
        padding: 0;
        display: grid;
        place-items: center;
      }

      .modal-panel img {
        display: block;
        max-width: 100vw;
        max-height: calc(100vh - (var(--modal-pad-y) * 2));
        width: auto;
        height: auto;
        object-fit: contain;
      }

      .modal-fallback {
        padding: 14px 12px;
        color: var(--ink-soft);
        font-weight: 700;
      }


      .compose-wrap {
        border-top: 1px solid var(--sky-edge);
        padding: 10px 12px 12px;
        padding-right: calc(12px + var(--profile-col-width) + var(--split-gap));
        background: linear-gradient(180deg, var(--sky-deep) 0%, var(--sky) 100%);
      }

      .format-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
      }

      .fmt {
        width: 26px;
        height: 24px;
        border: 1px solid #b0b0b0;
        border-radius: 3px;
        background: linear-gradient(180deg, #ffffff, #e8e8e8);
        display: grid;
        place-items: center;
        font-size: 12px;
        cursor: pointer;
        box-shadow: inset 0 1px 0 #fff;
        appearance: none;
        margin: 0;
        padding: 0;
        font: inherit;
        color: inherit;
      }

      .fmt.icon-only {
        width: 32px;
        height: 28px;
      }

      .fmt .icon-img {
        display: block;
        width: 18px;
        height: 18px;
        object-fit: contain;
        image-rendering: auto;
      }

      .fmt:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 2px;
      }

      .fmt.wide {
        width: auto;
        padding: 0 8px;
        font-size: 10.3px;
        font-weight: 700;
      }

      .fmt-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .emoji-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        z-index: 50;
        width: min(320px, 84vw);
        max-height: min(360px, 55vh);
        padding: 8px;
        border: 1px solid #b0b0b0;
        border-radius: 6px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
        overflow: auto;
      }

      .emoji-menu.is-up {
        top: auto;
        bottom: calc(100% + 8px);
      }

      .emoji-menu[hidden] {
        display: none;
      }

      .emoji-top {
        display: grid;
        gap: 6px;
        margin-bottom: 8px;
      }

      .emoji-search {
        width: 100%;
        height: 30px;
        padding: 0 8px;
        border: 1px solid #b0b0b0;
        border-radius: 6px;
        background: #fff;
        font-size: 12px;
        font-weight: 700;
        color: var(--ink);
      }

      .emoji-search::placeholder {
        color: var(--ink-soft);
        opacity: 0.75;
      }

      .emoji-section-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin: 2px 0 0;
      }

      .emoji-recent {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .emoji-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 6px;
      }

      .emoji-item {
        width: 30px;
        height: 30px;
        border: 1px solid #b0b0b0;
        border-radius: 6px;
        background: linear-gradient(180deg, #ffffff, #f1f1f1);
        display: grid;
        place-items: center;
        font-size: 16px;
        cursor: pointer;
        user-select: none;
        padding: 0;
      }

      .emoji-item:hover {
        background: linear-gradient(180deg, #ffffff, #fbfbfb);
        transform: translate(-1px, -1px);
      }

      .emoji-item:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 2px;
      }

      .emoji-hint {
        margin-top: 6px;
        font-size: 11px;
        color: var(--ink-soft);
      }

      .input-row {
        position: relative;
        display: block;
      }

      .input-row textarea {
        width: 100%;
        min-height: 64px;
        resize: vertical;
        font-size: 15.3px;
        line-height: 1.45;
        font-weight: 600;
        color: var(--ink);
        padding: 8px;
        border: 1px solid #b0b0b0;
        border-radius: 2px;
        background: #fff;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .input-row textarea::placeholder {
        font-weight: 600;
        color: var(--ink-soft);
        opacity: 0.65;
      }

      .input-actions {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        align-items: flex-start;
      }

      /* Send button removed (Enter to send). */

      .status-footer {
        padding: 3px 10px;
        border-top: 1px solid var(--sky-edge);
        background: linear-gradient(180deg, #eef3fa 0%, var(--sky-deep) 100%);
        color: var(--ink-soft);
        font-size: 12.3px;
      }

      @media (max-width: 640px) {
        .sidebar {
          width: 200px;
          flex-basis: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="chat-window" role="application" aria-label="Messenger style chat">
      <div class="title-bar">
        <div class="title-left">
          <img class="title-logo" id="winTitle" src="./Logo/quick_draw.png" alt="Quick Draw" />
        </div>
        <div class="title-right">

      function getThreadLastMs(t) {
        if (t.lastMessageAt != null && !Number.isNaN(Number(t.lastMessageAt))) {
          return Number(t.lastMessageAt);
        }
        const msgs = t.messages;
        if (!msgs?.length) return 0;
        const last = msgs[msgs.length - 1];
        if (last && last.at != null) return new Date(last.at).getTime();
        return 0;
      }

      function touchThreadActivity(t) {
        t.lastMessageAt = Date.now();

      function formatThreadListTime(ms) {
        if (!ms) return "";
        const delta = Math.max(0, Date.now() - ms);
        const eventDay = new Date(ms);
        const now = new Date();
        const dayStart = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
        const sameCalendarDay = dayStart(eventDay) === dayStart(now);

        if (delta < 60000) return "Just now";

        /* Same local calendar day: show minutes up to 59m, then hours. */
        if (sameCalendarDay) {
          const minsSameDay = Math.floor(delta / 60000);
          if (minsSameDay < 60) {
            return `${Math.max(1, minsSameDay)}m`;
          }
          const h = Math.max(1, Math.ceil(delta / 3600000));
          return `${h}h`;
        }

        const mins = Math.floor(delta / 60000);
        const hours = Math.floor(delta / 3600000);
        const days = Math.floor(delta / (24 * 3600000));
        if (mins < 60) return `${mins}m`;
        if (hours < 24) return `${hours}h`;
        if (days < 14) return `${days}d`;
        return eventDay.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      }

      (function initThreadTimestamps() {
        // 14 threads total, bucketed time ranges:
        // - 4 threads: 30 minutes → 10 hours
        // - 5 threads: 10 hours → 1 day
        // - 5 threads: 2 days → 4 days
        const bucketA = ["vectorclient", "cole", "animation_artist", "merch_assets"];
        const bucketB = ["concept_artist", "andrew_blanton", "cole_tony", "cole_profile", "lettering_artist"];
        const bucketC = ["gallery_rep", "printlab", "aspen_leong", "aspen_followup", "portrait_client"];

        function assignBucket(ids, minAgoMs, maxAgoMs) {
          const n = ids.length;
          ids.forEach((id, idx) => {
            const th = threads.find((x) => x.id === id);
            if (!th) return;
            const t = n <= 1 ? 0 : idx / (n - 1);
            const jitter = (Math.random() - 0.5) * 0.12; // +/- 6% to avoid uniform spacing
            const tt = Math.max(0, Math.min(1, t + jitter));
            th.lastMessageAt = Date.now() - (minAgoMs + tt * (maxAgoMs - minAgoMs));
          });
        }

        assignBucket(bucketA, 30 * 60 * 1000, 10 * 60 * 60 * 1000);
        assignBucket(bucketB, 10 * 60 * 60 * 1000, 24 * 60 * 60 * 1000);
        assignBucket(bucketC, 2 * 24 * 60 * 60 * 1000, 4 * 24 * 60 * 60 * 1000);

        threads.forEach((th) => {
          if (th.lastMessageAt == null) th.lastMessageAt = Date.now();
        });
      })();

      function buildEmojiMenu() {
        function makeEmojiButton(sym) {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "emoji-item";
          b.setAttribute("role", "menuitem");
          b.setAttribute("aria-label", sym);
          b.textContent = sym;
          b.tabIndex = -1; // roving tabindex
          b.addEventListener("click", () => {
            insertAtComposer(sym);
            statusFooter.textContent = "Emoticon inserted.";
            closeEmojiMenu();
            fmtEmoji.focus();
          });
          return b;
        }

        function setRovingFocus(items, idx) {
          const clamped = Math.max(0, Math.min(idx, items.length - 1));
          items.forEach((el, i) => (el.tabIndex = i === clamped ? 0 : -1));
          items[clamped]?.focus();
          return clamped;
        }

        const grid = document.createElement("div");
        grid.className = "emoji-grid";

        emojiMenu.innerHTML = "";
        emojiMenu.appendChild(grid);
        // No hint text in menu.

        grid.innerHTML = "";
        EMOTICONS.forEach((sym) => grid.appendChild(makeEmojiButton(sym)));
        let items = grid.querySelectorAll(".emoji-item");
        let focusIndex = 0;

        function refreshItems() {
          items = emojiMenu.querySelectorAll(".emoji-item");
          return [...items];
        }

        function focusFirst() {
          const arr = refreshItems();
          if (arr.length === 0) return;
          focusIndex = setRovingFocus(arr, 0);
        }

        function focusMove(delta, cols) {
          const arr = refreshItems();
          if (arr.length === 0) return;
          const next = cols ? focusIndex + delta * cols : focusIndex + delta;
          focusIndex = setRovingFocus(arr, next);
        }

        emojiMenu.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            e.preventDefault();
            closeEmojiMenu();
            fmtEmoji.focus();
            return;
          }
          if (e.key === "ArrowDown") {
            e.preventDefault();
            focusMove(1, 6);
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            focusMove(-1, 6);
          } else if (e.key === "ArrowRight") {
            e.preventDefault();
            focusMove(1, 0);
          } else if (e.key === "ArrowLeft") {
            e.preventDefault();
            focusMove(-1, 0);
          } else if (e.key === "Enter") {
            const arr = refreshItems();
            const el = arr.find((x) => x.tabIndex === 0) || document.activeElement;
            if (el && el.classList?.contains("emoji-item")) {
              e.preventDefault();
              el.click();
            }
          }
        });

        emojiMenu._focusSearch = () => focusFirst();
      }

      function addSysToActive(text) {
        const t = threads.find((x) => x.id === activeId);
        if (!t) return;
        t.messages.push({ type: "sys", text });
        touchThreadActivity(t);
        renderThreadList();
        renderMessages(t);
      }

      function setMaximized(on) {
        chatWindowEl.classList.toggle("is-maximized", on);
        document.body.classList.toggle("chat-maximized", on);
      }

      function buildThreadLi(t) {
        const li = document.createElement("li");
        li.className = "thread" + (t.id === activeId ? " is-active" : "");
        li.dataset.id = t.id;
        li.setAttribute("role", "option");
        li.setAttribute("aria-selected", t.id === activeId ? "true" : "false");

        const dot = document.createElement("span");
        dot.className = "status-dot" + (t.unread ? " unread" : "");
        dot.setAttribute("aria-hidden", "true");

        const body = document.createElement("div");
        body.className = "thread-body";
        body.innerHTML =
          '<div class="thread-row-top"><div class="name"></div><time class="thread-time"></time></div><div class="preview"></div><div class="sub"></div>';
        body.querySelector(".name").textContent = t.name;
        const lastMs = getThreadLastMs(t);
        const timeEl = body.querySelector(".thread-time");
        if (lastMs) {
          timeEl.dateTime = new Date(lastMs).toISOString();
          timeEl.textContent = formatThreadListTime(lastMs);
        } else {
          timeEl.removeAttribute("datetime");
          timeEl.textContent = "";
        }
        body.querySelector(".preview").textContent = t.preview;
        body.querySelector(".sub").textContent = t.flavor || "";

        li.appendChild(dot);
        li.appendChild(body);
        li.addEventListener("click", () => setActive(t.id));
        return li;
      }

      function renderThreadList() {
        const byLastMessage = (a, b) => getThreadLastMs(b) - getThreadLastMs(a);
        const onlineThreads = threads.filter((t) => t.online).sort(byLastMessage);
        const offlineThreads = threads.filter((t) => !t.online).sort(byLastMessage);

        threadMount.innerHTML = `
          <div class="thread-scroll" role="region" aria-label="Online and offline conversation threads">
            <div class="thread-section">Online <span class="count">(${onlineThreads.length})</span></div>
            <ul class="thread-list" id="onlineThreadList" role="listbox"></ul>
            <div class="thread-section">Offline <span class="count">(${offlineThreads.length})</span></div>
            <ul class="thread-list" id="offlineThreadList" role="listbox"></ul>
          </div>
        `;

        const onlineUl = threadMount.querySelector("#onlineThreadList");
        const offlineUl = threadMount.querySelector("#offlineThreadList");
        onlineThreads.forEach((t) => onlineUl.appendChild(buildThreadLi(t)));
        offlineThreads.forEach((t) => offlineUl.appendChild(buildThreadLi(t)));
      }

      function renderMessages(t) {
        historyEl.innerHTML = "";
        t.messages.forEach((m) => {
          const div = document.createElement("div");
          if (m.type === "sys") {
            div.className = "msg sys";
            div.textContent = m.text;
          } else if (m.type === "file") {
            div.className = "msg" + ((m.who || CURRENT_USER) === CURRENT_USER ? " me-line" : "");
            div.innerHTML = '<span class="who"></span>: ';
            div.querySelector(".who").textContent = m.who || CURRENT_USER;

            const wrap = document.createElement("span");
            wrap.className = "file-attach";

            const link = document.createElement("a");
            link.className = "file-link";
            link.href = m.url;
            link.download = m.name || "download";
            link.setAttribute("aria-label", m.name ? `Download ${m.name}` : "Download file");
            link.title = m.name || "Download";

            const thumb = document.createElement("span");
            thumb.className = "file-thumb";
            if (m.thumbUrl) {
              const img = document.createElement("img");
              img.alt = "";
              img.src = m.thumbUrl;
              thumb.appendChild(img);
            } else {
              const ext = document.createElement("span");
              ext.className = "ext";
              ext.textContent = (m.ext || "FILE").slice(0, 6);
              thumb.appendChild(ext);
            }
            link.appendChild(thumb);
            wrap.appendChild(link);

            div.appendChild(wrap);
          } else if (m.type === "file-group") {
            div.className = "msg" + ((m.who || CURRENT_USER) === CURRENT_USER ? " me-line" : "");
            div.innerHTML = '<span class="who"></span>: ';
            div.querySelector(".who").textContent = m.who || CURRENT_USER;

            const group = document.createElement("span");
            group.className = "file-group";

            (m.files || []).forEach((f) => {
              const link = document.createElement("a");
              link.className = "file-link";
              link.href = f.url;
              link.download = f.name || "download";
              link.setAttribute("aria-label", f.name ? `Download ${f.name}` : "Download file");
              link.title = f.name || "Download";

              const thumb = document.createElement("span");
              thumb.className = "file-thumb";
              if (f.thumbUrl) {
                const img = document.createElement("img");
                img.alt = "";
                img.src = f.thumbUrl;
                thumb.appendChild(img);
              } else {
                const ext = document.createElement("span");
                ext.className = "ext";
                ext.textContent = (f.ext || "FILE").slice(0, 6);
                thumb.appendChild(ext);
              }

              link.appendChild(thumb);
              group.appendChild(link);
            });

            div.appendChild(group);
          } else {
            div.className = "msg" + (m.who === CURRENT_USER ? " me-line" : "");
            div.innerHTML = '<span class="who"></span>: ';
            div.querySelector(".who").textContent = m.who;
            div.appendChild(document.createTextNode(m.text));
          }
          historyEl.appendChild(div);
        });
        historyEl.scrollTop = historyEl.scrollHeight;
      }

      function setActive(id) {
        activeId = id;
        const t = threads.find((x) => x.id === id);
        if (!t) return;
        t.unread = false;

        renderThreadList();
        toNameEl.textContent = t.name;
        if (t.email) {
          toEmailEl.textContent = t.email;
          toEmailEl.hidden = false;
        } else {
          toEmailEl.textContent = "";
          toEmailEl.hidden = true;
        }
        document.title = "Conversation — " + t.name;

        // Update profile pictures (fallbacks keep UI stable even if an image is missing).
        toPic.src = t.avatar || "./UserCards/Curryoke_F.jpg";
        toPic.alt = `${t.name} profile picture`;

        const warnValue = (t.warn ?? "").toString();
        const cleanedWarn = warnValue
          // Remove common invisible / formatting codepoints
          .replace(/[\u00AD\u034F\u061C\u200B-\u200F\u202A-\u202E\u2060-\u206F\uFEFF]/g, "")
          .replace(/[\s\u00A0]+/g, " ")
          .trim();
        // Only show the bar when there's something visibly renderable.
        if (cleanedWarn.replace(/[^\p{L}\p{N}\p{P}\p{S}]/gu, "").length) {
          warnBar.hidden = false;
          warnBar.style.display = "flex";
          warnText.textContent = cleanedWarn;
        } else {
          warnBar.hidden = true;
          warnBar.style.display = "none";
          warnText.textContent = "";
        }

        renderMessages(t);
        statusFooter.textContent = "";
      }

      function sendMessage() {
        const text = (composer.value || "").trim();
        if (!text) return;

        const t = threads.find((x) => x.id === activeId);
        if (!t) return;

        t.messages.push({ type: "msg", who: CURRENT_USER, text });
        touchThreadActivity(t);
        t.preview = text.length > 40 ? text.slice(0, 37) + "…" : text;
        composer.value = "";
        renderThreadList();
        renderMessages(t);
        statusFooter.textContent = "Your message has been sent.";
      }

      composer.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      backBtn.addEventListener("click", () => {
        window.location.href = "./MatchPreviewPage.html";
      });

      function openModal() {
        coleCardModal.hidden = false;
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        coleCardModal.hidden = true;
        document.body.style.overflow = "";
      }

      openColeCard.addEventListener("click", () => {
        openModal();
      });

      coleCardModal.addEventListener("click", (e) => {
        if (e.target === coleCardModal) closeModal();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !coleCardModal.hidden) closeModal();
      });

      coleCardImg.addEventListener("error", () => {
        coleCardFallback.hidden = false;
      });

      sendFilesBtn.addEventListener("click", () => tbFilePick.click());
      tbFilePick.addEventListener("change", () => {
        const files = [...tbFilePick.files];
        if (!files.length) return;
        const t = threads.find((x) => x.id === activeId);
        if (!t) return;

        const makeId = () =>
          (window.crypto?.randomUUID ? crypto.randomUUID() : `f_${Date.now()}_${Math.random().toString(16).slice(2)}`);

        const fmtSize = (bytes) => {
          if (!Number.isFinite(bytes)) return "";
          const units = ["B", "KB", "MB", "GB"];
          let v = bytes;
          let i = 0;
          while (v >= 1024 && i < units.length - 1) {
            v /= 1024;
            i += 1;
          }
          const n = i === 0 ? Math.round(v) : Math.round(v * 10) / 10;
          return `${n} ${units[i]}`;
        };

        const makeVideoThumb = (blobUrl) =>
          new Promise((resolve, reject) => {
            try {
              const video = document.createElement("video");
              video.preload = "metadata";
              video.muted = true;
              video.playsInline = true;
              video.src = blobUrl;

              const cleanup = () => {
                video.removeAttribute("src");
                video.load();
              };

              video.addEventListener(
                "loadedmetadata",
                () => {
                  const t = Math.min(0.2, Math.max(0.01, (video.duration || 1) * 0.02));
                  // Some browsers require a seek before current frame is available.
                  video.currentTime = t;
                },
                { once: true },
              );

              video.addEventListener(
                "seeked",
                () => {
                  const canvas = document.createElement("canvas");
                  canvas.width = 75;
                  canvas.height = 75;
                  const ctx = canvas.getContext("2d");
                  if (!ctx) {
                    cleanup();
                    reject(new Error("no canvas ctx"));
                    return;
                  }
                  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                  const dataUrl = canvas.toDataURL("image/png");
                  cleanup();
                  resolve(dataUrl);
                },
                { once: true },
              );

              video.addEventListener(
                "error",
                () => {
                  cleanup();
                  reject(new Error("video error"));
                },
                { once: true },
              );
            } catch (e) {
              reject(e);
            }
          });

        const groupId = makeId();
        const fileEntries = files.map((f) => {
          const url = URL.createObjectURL(f);
          const isImg = /^image\//i.test(f.type || "");
          const isVideo = /^video\//i.test(f.type || "");
          const ext = (f.name.split(".").pop() || "file").toUpperCase();
          return {
            id: makeId(),
            name: f.name,
            url,
            thumbUrl: isImg ? url : "",
            ext,
            isVideo,
            sizeLabel: f.size ? fmtSize(f.size) : "",
          };
        });

        t.messages.push({
          id: groupId,
          type: "file-group",
          who: CURRENT_USER,
          files: fileEntries.map(({ id, name, url, thumbUrl, ext }) => ({ id, name, url, thumbUrl, ext })),
        });
        touchThreadActivity(t);

        // Generate thumbnails for videos asynchronously.
        fileEntries
          .filter((x) => x.isVideo)
          .forEach((x) => {
            makeVideoThumb(x.url)
              .then((thumbUrl) => {
                const group = t.messages.find((m) => m && m.id === groupId);
                if (!group || group.type !== "file-group") return;
                const target = (group.files || []).find((f) => f && f.url === x.url);
                if (!target) return;
                target.thumbUrl = thumbUrl;
                target.ext = "";
                if (activeId === t.id) renderMessages(t);
              })
              .catch(() => {
                // keep extension tile fallback
              });
          });

        t.preview = files.length === 1 ? `📎 ${files[0].name}` : `📎 ${files.length} files`;
        renderThreadList();
        renderMessages(t);
        statusFooter.textContent = files.length === 1 ? "File sent." : "Files sent.";
        tbFilePick.value = "";
      });

      buildEmojiMenu();

      fmtEmoji.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        toggleEmojiMenu();
      });

      fmtEmoji.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown" || e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (emojiMenu.hidden) openEmojiMenu();
          else emojiMenu._focusSearch?.();
        }
      });

      document.addEventListener("click", (e) => {
        const t = e.target;
        if (emojiMenu.hidden) return;
        if (t === fmtEmoji || fmtEmoji.contains(t)) return;
        if (t === emojiMenu || emojiMenu.contains(t)) return;
        closeEmojiMenu();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (!emojiMenu.hidden) {
            closeEmojiMenu();
            statusFooter.textContent = "The emoticon menu has been closed.";
          }
        }
      });

      window.addEventListener(
        "scroll",
        () => {
          if (!emojiMenu.hidden) closeEmojiMenu();
        },
        { passive: true },
      );

      window.addEventListener("resize", () => {
        if (!emojiMenu.hidden) closeEmojiMenu();
      });

      renderThreadList();
      setActive(activeId);
    </script>
  </body>
</html>
