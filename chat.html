<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MSN Messenger — Conversation</title>
    <style>
      /*
        Classic MSN Messenger look — tinted to Quick Draw / Match Preview palette.
      */
      @font-face {
        font-family: "IEatCrayons";
        src: url("./Fonts/i-eat-crayons.ttf") format("truetype");
        font-style: normal;
        font-weight: 400 700;
      }

      :root {
        --blue: #07279a;
        --pink: #d54aa9;
        --paper: #f4efff;
        --paper-2: #ece4ff;
        --ink: #07279a;
        --ink-soft: #3f4f9a;

        --msn-sky: #e6dcff;
        --msn-sky-deep: #ddd4f0;
        --msn-sky-edge: #b5a3d6;
        --msn-menu: #f2ecff;
        --surface: var(--msn-sky);
        --surface-deep: var(--msn-sky-deep);
        --xp-blue: var(--blue);
        --win-bg: var(--msn-sky);
        --win-border-outer: #9a88c4;
        --win-border: var(--blue);
        --menu-bg: var(--msn-menu);
        --inset-dark: #808080;
        --inset-light: #ffffff;
        --text: var(--ink);
        --online: #008000;
        --away: #c06000;
        --busy: #c00000;
        --offline: #c00000;
        --history-bg: #ffffff;
        --warn-bg: #fffacd;
        --toolbar-icon-size: 48px;
        --to-name: #a04818;
        --wlm-purple-top: #ece8fb;
        --wlm-purple-mid: #c4b5e8;
        --wlm-purple-bot: #8b7ece;
        --wave: radial-gradient(ellipse 90% 70% at 30% 25%, rgba(255, 255, 255, 0.55) 0%, transparent 58%);
        --wave2: radial-gradient(ellipse 80% 60% at 85% 75%, rgba(255, 255, 255, 0.42) 0%, transparent 52%);
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
        letter-spacing: 0.1em;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        font-family: "IEatCrayons", Tahoma, "Segoe UI", "MS Sans Serif", Geneva, sans-serif;
        font-weight: 700;
        font-size: 12px;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, #d54aa938 0%, #ffffff00 42%),
          radial-gradient(circle at 85% 12%, #07279a33 0%, #ffffff00 45%),
          var(--paper-2);
        display: flex;
        flex-direction: column;
      }

      button,
      input,
      textarea,
      select {
        letter-spacing: inherit;
      }

      /* Full-viewport panel */
      .msn-window {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        width: 100%;
        min-height: 0;
        background: var(--paper);
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
      }

      .title-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 5px 4px 8px;
        background: linear-gradient(180deg, #051451 0%, var(--blue) 38%, var(--ink-soft) 100%);
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.12em;
        user-select: none;
      }

      .title-bar .title-left {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .title-bar .title-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .title-msn {
        font-family: Tahoma, Arial, sans-serif;
        font-style: italic;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 0.06em;
        text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.35);
        opacity: 0.95;
      }

      .title-bar .butterfly {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        background: conic-gradient(
          #7cbb00 0deg 90deg,
          #ffb900 90deg 180deg,
          #00a4ef 180deg 270deg,
          #f25022 270deg 360deg
        );
        border-radius: 2px;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.2);
      }

      .title-bar span.title-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .title-buttons {
        display: flex;
        gap: 2px;
      }

      .title-buttons button {
        width: 21px;
        height: 21px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: linear-gradient(180deg, var(--ink-soft), var(--blue));
        color: #fff;
        font-size: 12px;
        line-height: 1;
        padding: 0;
        cursor: default;
      }

      .title-buttons button.close {
        background: linear-gradient(180deg, #e88, #c33);
      }

      .title-buttons button {
        cursor: pointer;
      }

      .msn-window.is-maximized {
        position: fixed;
        inset: 0;
        z-index: 10000;
        max-height: 100dvh;
        width: 100%;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
      }

      body.chat-maximized {
        overflow: hidden;
      }

      .msn-window.is-minimized .toolbar,
      .msn-window.is-minimized .main-split {
        display: none !important;
      }

      .toolbar {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        padding: 10px 12px 12px;
        background: linear-gradient(180deg, #ffffff 0%, #e2ecf8 55%, var(--msn-sky-deep) 100%);
        border-bottom: 1px solid #9aaec4;
        flex-wrap: wrap;
      }

      .tb-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        width: var(--toolbar-icon-size);
        cursor: pointer;
        appearance: none;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        font: inherit;
        color: inherit;
      }

      .tb-btn:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 3px;
        border-radius: 10px;
      }

      .tb-btn .icon {
        width: 38px;
        height: 38px;
        border-radius: 9px;
        border: 1px solid #6a8ec0;
        background: linear-gradient(180deg, #ffffff 0%, var(--wlm-purple-mid) 42%, var(--wlm-purple-bot) 100%);
        display: grid;
        place-items: center;
        font-size: 17px;
        box-shadow:
          0 2px 5px rgba(40, 80, 130, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.85);
      }

      .tb-btn span.label {
        font-size: 10px;
        color: var(--ink-soft);
        text-align: center;
        line-height: 1.15;
      }

      .main-split {
        flex: 1;
        display: flex;
        min-height: 0;
        background: var(--wave), var(--wave2), linear-gradient(175deg, #e6eef8 0%, var(--msn-sky) 60%);
      }

      /* Sidebar: threads */
      .sidebar {
        width: 260px;
        flex: 0 0 260px;
        border-right: 1px solid var(--msn-sky-edge);
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: var(--wave), linear-gradient(180deg, #eaf1fa 0%, var(--msn-sky) 100%);
      }

      .avatar {
        flex-shrink: 0;
        border: 1px solid #888;
      }

      .thread-list-wrap {
        flex: 1;
        overflow: auto;
        padding: 8px;
        background: var(--wave2), linear-gradient(180deg, var(--msn-sky) 0%, #cad8ea 100%);
      }

      .thread-section {
        font-weight: 700;
        font-size: 11px;
        margin: 6px 0 4px 4px;
        color: var(--ink-soft);
      }

      .thread-section .count {
        font-weight: 400;
        color: #666;
      }

      .sidebar-brand {
        padding: 8px 10px;
        border-top: 1px solid var(--msn-sky-edge);
        background: linear-gradient(180deg, #eef3fa 0%, var(--msn-sky-deep) 100%);
        text-align: center;
        font-size: 10px;
        color: #3d4d60;
      }

      .sidebar-brand .msn-word {
        font-style: italic;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 0.05em;
      }

      .sidebar-brand .net {
        font-weight: 700;
        color: #666;
      }

      .thread-list {
        list-style: none;
        margin: 0;
        padding: 0;
        background-color: #fff;
        border: 1px solid;
        border-color: var(--inset-dark) var(--inset-light) var(--inset-light) var(--inset-dark);
      }

      .thread {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        padding: 5px 6px;
        cursor: pointer;
        border-bottom: 1px solid #e0e0e0;
      }

      .thread:last-child {
        border-bottom: 0;
      }

      .thread:hover {
        background: rgba(49, 106, 197, 0.18);
      }

      .thread.is-active {
        background: #316ac5;
        color: #fff;
      }

      .thread.is-active .thread-body .name {
        color: #ffffff;
      }

      .thread.is-active .preview,
      .thread.is-active .sub {
        color: rgba(255, 255, 255, 0.92);
      }

      .status-dot {
        width: 14px;
        height: 14px;
        margin-top: 1px;
        flex-shrink: 0;
        border-radius: 2px;
        background: var(--online);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.15);
      }

      .status-dot.away {
        background: var(--away);
      }

      .status-dot.busy {
        background: var(--busy);
      }

      .status-dot.offline {
        background: var(--offline);
      }

      .thread-body {
        min-width: 0;
      }

      .thread-body .name {
        font-weight: 700;
        font-size: 12px;
        color: #141414;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .thread-body .preview {
        font-size: 12px;
        color: #2a2a2a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .thread-body .sub {
        font-size: 11px;
        color: #444444;
        font-style: italic;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Main chat pane — MSN sky panel */
      .chat-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        background: var(--wave), linear-gradient(195deg, #e4edf8 0%, var(--msn-sky) 45%);
      }

      .chat-header {
        padding: 8px 12px 10px;
        background: transparent;
        border-bottom: 1px solid var(--msn-sky-edge);
        font-size: 13px;
      }

      .chat-header .to-line {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 0 6px;
        font-weight: 700;
        color: #1a1a1a;
      }

      .chat-header .to-prefix {
        color: #333;
      }

      .chat-header .to-name {
        color: var(--to-name);
        font-weight: 700;
      }

      .chat-header .to-email {
        display: block;
        margin-top: 3px;
        font-size: 11px;
        font-weight: 400;
        color: #333333;
      }

      .warn-bar {
        margin: 10px 12px 0;
        padding: 8px 10px;
        background: var(--warn-bg);
        border: 1px solid #e8dc82;
        border-radius: 2px;
        display: flex;
        gap: 8px;
        align-items: flex-start;
        font-size: 13px;
        line-height: 1.45;
        color: #2a2410;
      }

      .warn-bar #warnText {
        flex: 1;
        min-width: 0;
      }

      .warn-bar .i {
        font-weight: 900;
        color: #fff;
        background: #2d6bcd;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 11px;
        flex-shrink: 0;
      }

      .chat-body {
        flex: 1;
        display: flex;
        min-height: 0;
        padding: 10px 12px;
        gap: 10px;
        background: transparent;
      }

      .history {
        flex: 1;
        background-color: var(--history-bg);
        border: 1px solid;
        border-color: var(--inset-dark) var(--inset-light) var(--inset-light) var(--inset-dark);
        border-radius: 2px;
        box-shadow: inset 1px 1px 0 rgba(0, 0, 0, 0.08);
        overflow: auto;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.55;
        color: #141414;
      }

      .msg {
        margin-bottom: 8px;
        color: #141414;
      }

      .msg .who {
        font-weight: 700;
        color: #052080;
      }

      .msg.me-line .who {
        color: #052080;
      }

      .msg.sys {
        font-style: italic;
        color: #3d3d3d;
      }

      .dp-column {
        width: 64px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        padding: 6px 4px 8px;
        align-self: stretch;
        background: var(--wave2), var(--wave), linear-gradient(200deg, #e8f1fb 0%, #b8cce8 100%);
        border: 1px solid #8fa8c4;
        border-radius: 6px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      }

      /* Reference: DP stack — Me on top (MSN mark), contact below (ducky colors) */
      .dp-column .avatar.sm {
        width: 52px;
        height: 52px;
      }

      .dp-column .avatar.sm.me {
        background: conic-gradient(
          #7cbb00 0deg 90deg,
          #ffb900 90deg 180deg,
          #00a4ef 180deg 270deg,
          #f25022 270deg 360deg
        );
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.15);
      }

      .dp-column .avatar.sm.them {
        background: linear-gradient(145deg, #ffe866 0%, #ffb000 45%, #ff9a00 100%);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.12);
      }

      .dp-column .avatar.sm.them::after {
        content: "🦆";
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        font-size: 22px;
        filter: saturate(1.1);
      }


      .compose-wrap {
        border-top: 1px solid var(--msn-sky-edge);
        padding: 10px 12px 12px;
        background: linear-gradient(180deg, var(--msn-sky-deep) 0%, var(--msn-sky) 100%);
      }

      .format-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
      }

      .fmt {
        width: 26px;
        height: 24px;
        border: 1px solid #b0b0b0;
        border-radius: 3px;
        background: linear-gradient(180deg, #ffffff, #e8e8e8);
        display: grid;
        place-items: center;
        font-size: 12px;
        cursor: pointer;
        box-shadow: inset 0 1px 0 #fff;
        appearance: none;
        margin: 0;
        padding: 0;
        font: inherit;
        color: inherit;
      }

      .fmt:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 2px;
      }

      .fmt.palette {
        width: auto;
        padding: 0 4px;
        gap: 2px;
        display: inline-flex;
      }

      .fmt.palette i {
        width: 8px;
        height: 10px;
        border: 1px solid #666;
      }

      .fmt.palette i.c1 {
        background: #000;
      }
      .fmt.palette i.c2 {
        background: #c00000;
      }
      .fmt.palette i.c3 {
        background: #16365c;
      }

      .fmt.wide {
        width: auto;
        padding: 0 8px;
        font-size: 10px;
        font-weight: 700;
      }

      .input-row {
        display: flex;
        gap: 10px;
        align-items: stretch;
      }

      .input-row textarea {
        flex: 1;
        min-height: 64px;
        resize: vertical;
        font-family: Tahoma, "Segoe UI", "MS Sans Serif", Geneva, sans-serif;
        font-size: 13px;
        line-height: 1.45;
        color: #141414;
        padding: 8px;
        border: 1px solid #b0b0b0;
        border-radius: 2px;
        background: #fff;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .input-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 84px;
        flex-shrink: 0;
      }

      .send-btn,
      .search-btn {
        width: 100%;
        font-family: Tahoma, "Segoe UI", "MS Sans Serif", Geneva, sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: #141414;
        min-height: 28px;
        background: linear-gradient(180deg, #ffffff, #ebebeb);
        border: 1px solid #b0b0b0;
        border-radius: 4px;
        color: #000;
        box-shadow: inset 0 1px 0 #fff;
        cursor: pointer;
      }

      .send-btn:hover,
      .search-btn:hover {
        background: linear-gradient(180deg, #ffffff, #f5f5f5);
      }

      .status-footer {
        padding: 3px 10px;
        border-top: 1px solid var(--msn-sky-edge);
        background: linear-gradient(180deg, #eef3fa 0%, var(--msn-sky-deep) 100%);
        color: #1a2433;
        font-size: 12px;
      }

      @media (max-width: 640px) {
        .sidebar {
          width: 200px;
          flex-basis: 200px;
        }
        .toolbar {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <div class="msn-window" role="application" aria-label="MSN Messenger style chat">
      <div class="title-bar">
        <div class="title-left">
          <span class="butterfly" aria-hidden="true"></span>
          <span class="title-text" id="winTitle">MSN Messenger — Conversation</span>
        </div>
        <div class="title-right">
          <span class="title-msn" aria-hidden="true">msn</span>
          <div class="title-buttons">
            <button type="button" id="titleMin" aria-label="Minimize">_</button>
            <button type="button" id="titleMax" aria-label="Maximize">□</button>
            <button type="button" class="close" id="titleClose" aria-label="Close">×</button>
          </div>
        </div>
      </div>

      <input type="file" id="tbFilePick" hidden multiple />

      <div class="toolbar" role="toolbar" aria-label="Conversation actions">
        <button type="button" class="tb-btn" id="tbInvite" aria-label="Invite">
          <span class="icon" aria-hidden="true">👥</span>
          <span class="label">Invite</span>
        </button>
        <button type="button" class="tb-btn" id="tbSendFiles" aria-label="Send files">
          <span class="icon" aria-hidden="true">📎</span>
          <span class="label">Send<br />Files</span>
        </button>
        <button type="button" class="tb-btn" id="tbVideo" aria-label="Video">
          <span class="icon" aria-hidden="true">📹</span>
          <span class="label">Video</span>
        </button>
        <button type="button" class="tb-btn" id="tbVoice" aria-label="Voice">
          <span class="icon" aria-hidden="true">🎤</span>
          <span class="label">Voice</span>
        </button>
      </div>

      <div class="main-split">
        <aside class="sidebar" aria-label="Message threads">
          <div class="thread-list-wrap" id="threadMount"></div>

          <div class="sidebar-brand" aria-hidden="true">
            <span class="msn-word">msn</span>
            <span class="net"> Messenger</span> ·
            <span class="net">.net</span>
          </div>
        </aside>

        <section class="chat-pane" aria-label="Active conversation">
          <div class="chat-header">
            <div class="to-line">
              <span class="to-prefix">To:</span>
              <span class="to-name" id="toName">—</span>
            </div>
            <span class="to-email" id="toEmail" hidden></span>
          </div>

          <div class="warn-bar" id="warnBar" hidden>
            <span class="i">i</span>
            <span id="warnText"></span>
          </div>

          <div class="chat-body">
            <div class="history" id="history" tabindex="0"></div>
            <div class="dp-column" aria-hidden="true">
              <div class="avatar sm me" title="Me"></div>
              <div class="avatar sm them" title="Them"></div>
            </div>
          </div>

          <div class="compose-wrap">
            <div class="format-bar" role="toolbar" aria-label="Format">
              <button type="button" class="fmt" id="fmtFont" title="Font size">A</button>
              <button type="button" class="fmt" id="fmtEmoji" title="Insert emoticon">☺</button>
              <button type="button" class="fmt palette" id="fmtPalette" title="Font color" aria-label="Font color">
                <i class="c1"></i><i class="c2"></i><i class="c3"></i>
              </button>
              <button type="button" class="fmt wide" id="fmtVoiceClip" title="Voice clip">Voice clip</button>
            </div>
            <div class="input-row">
              <textarea id="composer" placeholder="Type a message here…" rows="3"></textarea>
              <div class="input-actions">
                <button class="send-btn" id="sendBtn" type="button">Send</button>
                <button class="search-btn" id="searchBtn" type="button">Search</button>
              </div>
            </div>
          </div>

          <div class="status-footer" id="statusFooter">Ready</div>
        </section>
      </div>
    </div>

    <script>
      const threads = [
        {
          id: "vectorclient",
          name: "Jessica Morales",
          email: "jessica.morales@hotmail.com",
          online: true,
          statusClass: "",
          statusShort: "Online",
          flavor: "",
          preview: "Rev A looks perf — one tweak?",
          warn: "This contact may be slow to reply while reviewing your commission files.",
          messages: [
            { type: "msg", who: "Me", text: "Uploaded Rev B of the logo vector package (commission #2041)." },
            { type: "sys", text: "*Deliverables marked ready for client review.*" },
            { type: "msg", who: "Jessica Morales", text: "Rev A looks perf — one tweak on the stroke weight?" },
            { type: "sys", text: "Milestone 2/3 for this commission is invoiced." },
          ],
        },
        {
          id: "rush_client",
          name: "Marcus Reid",
          email: "marcus.reid@hotmail.com",
          online: true,
          statusClass: "away",
          statusShort: "Away",
          flavor: "commission: event poster",
          preview: "can we lock delivery for Friday?",
          warn: "",
          messages: [
            { type: "msg", who: "Marcus Reid", text: "can we lock delivery for Friday? it's for the gallery opening commission." },
            { type: "msg", who: "Me", text: "yes if you approve the flat colors by Wed night" },
          ],
        },
        {
          id: "merch_assets",
          name: "Nina Kowalski",
          email: "nina.kowalski@hotmail.com",
          online: true,
          statusClass: "busy",
          statusShort: "Busy",
          flavor: "band merch commission",
          preview: "PNG masters for the shirt run?",

          ],

        {

          name: "Alexandra Rivera",
          email: "alexandra.rivera@rivergallery.art",
          online: false,
          statusClass: "offline",
          statusShort: "Offline",
          flavor: "",
          preview: "Wall labels for the group show commission.",
          warn: "",
          messages: [
            { type: "msg", who: "Alexandra Rivera", text: "Wall labels copy for the group show commission — need final titles by Mon." },
            { type: "msg", who: "Me", text: "will send a doc tonight with artist names + mediums" },

      const threadMount = document.getElementById("threadMount");
      const historyEl = document.getElementById("history");
      const toNameEl = document.getElementById("toName");
      const toEmailEl = document.getElementById("toEmail");
      const winTitleEl = document.getElementById("winTitle");
      const warnBar = document.getElementById("warnBar");
      const warnText = document.getElementById("warnText");
      const composer = document.getElementById("composer");
      const sendBtn = document.getElementById("sendBtn");
      const searchBtn = document.getElementById("searchBtn");
      const statusFooter = document.getElementById("statusFooter");
      const msnWindowEl = document.querySelector(".msn-window");
      const titleMin = document.getElementById("titleMin");
      const titleMax = document.getElementById("titleMax");
      const titleClose = document.getElementById("titleClose");
      const tbFilePick = document.getElementById("tbFilePick");
      const tbInvite = document.getElementById("tbInvite");
      const tbSendFiles = document.getElementById("tbSendFiles");
      const tbVideo = document.getElementById("tbVideo");
      const tbVoice = document.getElementById("tbVoice");
      const fmtFont = document.getElementById("fmtFont");
      const fmtEmoji = document.getElementById("fmtEmoji");
      const fmtPalette = document.getElementById("fmtPalette");
      const fmtVoiceClip = document.getElementById("fmtVoiceClip");

      let activeId = threads.find((t) => t.online)?.id ?? threads[0]?.id ?? null;
      let fontSizeStep = 0;
      const composerFontSizes = ["11px", "13px", "15px"];
      let paletteStep = 0;
      const composerColors = ["#000000", "#c00000", "var(--ink)"];

      function addSysToActive(text) {
        const t = threads.find((x) => x.id === activeId);
        if (!t) return;
        t.messages.push({ type: "sys", text });
        renderMessages(t);
      }

      function setMaximized(on) {
        msnWindowEl.classList.toggle("is-maximized", on);
        document.body.classList.toggle("chat-maximized", on);
      }

      function buildThreadLi(t) {
        const li = document.createElement("li");
        li.className = "thread" + (t.id === activeId ? " is-active" : "");
        li.dataset.id = t.id;
        li.setAttribute("role", "option");
        li.setAttribute("aria-selected", t.id === activeId ? "true" : "false");

        const dot = document.createElement("span");
        dot.className = "status-dot " + (t.statusClass || "");
        dot.setAttribute("aria-hidden", "true");

        const body = document.createElement("div");
        body.className = "thread-body";
        body.innerHTML = '<div class="name"></div><div class="preview"></div><div class="sub"></div>';
        body.querySelector(".name").textContent = t.name;
        body.querySelector(".preview").textContent = t.preview;
        body.querySelector(".sub").textContent = t.flavor || "";

        li.appendChild(dot);
        li.appendChild(body);
        li.addEventListener("click", () => setActive(t.id));
        return li;
      }

      function renderThreadList() {
        const onlineThreads = threads.filter((t) => t.online);
        const offlineThreads = threads.filter((t) => !t.online);

        threadMount.innerHTML = `
          <div class="thread-section">Online <span class="count">(${onlineThreads.length})</span></div>
          <ul class="thread-list" id="onlineThreadList" role="listbox"></ul>
          <div class="thread-section">Offline <span class="count">(${offlineThreads.length})</span></div>
          <ul class="thread-list" id="offlineThreadList" role="listbox"></ul>
        `;

        const onlineUl = threadMount.querySelector("#onlineThreadList");
        const offlineUl = threadMount.querySelector("#offlineThreadList");
        onlineThreads.forEach((t) => onlineUl.appendChild(buildThreadLi(t)));
        offlineThreads.forEach((t) => offlineUl.appendChild(buildThreadLi(t)));
      }

      function renderMessages(t) {
        historyEl.innerHTML = "";
        t.messages.forEach((m) => {
          const div = document.createElement("div");
          if (m.type === "sys") {
            div.className = "msg sys";
            div.textContent = m.text;
          } else {
            div.className = "msg" + (m.who === "Me" ? " me-line" : "");
            div.innerHTML = '<span class="who"></span>: ';
            div.querySelector(".who").textContent = m.who;
            div.appendChild(document.createTextNode(m.text));
          }
          historyEl.appendChild(div);
        });
        historyEl.scrollTop = historyEl.scrollHeight;
      }

      function setActive(id) {
        activeId = id;
        const t = threads.find((x) => x.id === id);
        if (!t) return;

        renderThreadList();
        toNameEl.textContent = t.name;
        if (t.email) {
          toEmailEl.textContent = t.email;
          toEmailEl.hidden = false;
        } else {
          toEmailEl.textContent = "";
          toEmailEl.hidden = true;
        }
        winTitleEl.textContent = "Conversation — " + t.name;

        if (t.warn) {
          warnBar.hidden = false;
          warnText.textContent = t.warn;
        } else {
          warnBar.hidden = true;
          warnText.textContent = "";
        }

        renderMessages(t);
        statusFooter.textContent = "Last message in this conversation.";
      }

      function sendMessage() {
        const text = (composer.value || "").trim();
        if (!text) return;

        const t = threads.find((x) => x.id === activeId);
        if (!t) return;

        t.messages.push({ type: "msg", who: "Me", text });
        t.preview = text.length > 40 ? text.slice(0, 37) + "…" : text;
        composer.value = "";
        renderThreadList();
        renderMessages(t);
        statusFooter.textContent = "Message sent.";
      }

      sendBtn.addEventListener("click", sendMessage);
      searchBtn.addEventListener("click", () => {
        const q = window.prompt("Find text in this conversation:");
        if (q === null) return;
        const needle = q.trim();
        if (!needle) {
          statusFooter.textContent = "Search cancelled.";
          return;
        }
        const t = threads.find((x) => x.id === activeId);
        if (!t) return;
        const lower = needle.toLowerCase();
        const hits = t.messages.filter(
          (m) => m.type === "msg" && (m.text || "").toLowerCase().includes(lower),
        );
        if (hits.length === 0) {
          statusFooter.textContent = "No messages match your search.";
          return;
        }
        statusFooter.textContent = `Found ${hits.length} message(s) containing “${needle}”.`;
        composer.value = hits[hits.length - 1].text;
        composer.focus();
      });

      composer.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      titleMin.addEventListener("click", () => {
        const nowMin = msnWindowEl.classList.toggle("is-minimized");
        if (nowMin) {
          setMaximized(false);
        }
        statusFooter.textContent = nowMin
          ? "Window minimized — click Minimize again to restore."
          : "Window restored.";
      });

      titleMax.addEventListener("click", () => {
        const on = !msnWindowEl.classList.contains("is-maximized");
        setMaximized(on);
        if (on) {
          msnWindowEl.classList.remove("is-minimized");
        }
        statusFooter.textContent = on ? "Maximized." : "Returned to normal size.";
      });

      titleClose.addEventListener("click", () => {
        window.location.href = "./MatchPreviewPage.html";
      });

      tbInvite.addEventListener("click", () => {
        const who = window.prompt("Invite someone to this conversation (email or sign-in name):", "");
        if (who === null) {
          statusFooter.textContent = "Invite cancelled.";
          return;
        }
        const v = who.trim();
        if (!v) {
          statusFooter.textContent = "Invite cancelled.";
          return;
        }
        addSysToActive(`*Invitation sent to ${v}.*`);
        statusFooter.textContent = `Invite queued for “${v}” (demo).`;
      });

      tbSendFiles.addEventListener("click", () => tbFilePick.click());
      tbFilePick.addEventListener("change", () => {
        const files = [...tbFilePick.files];
        if (!files.length) return;
        const list = files.map((f) => f.name).join(", ");
        addSysToActive(`*Sending file(s): ${list}*`);
        statusFooter.textContent =
          files.length === 1 ? `Attached “${files[0].name}”.` : `Attached ${files.length} files.`;
        tbFilePick.value = "";
      });

      tbVideo.addEventListener("click", () => {
        addSysToActive("*Starting video session…*");
        statusFooter.textContent = "Video: connecting… (demo)";
      });

      tbVoice.addEventListener("click", () => {
        addSysToActive("*Voice call started.*");
        statusFooter.textContent = "Voice: channel open (demo).";
      });

      fmtFont.addEventListener("click", () => {
        fontSizeStep = (fontSizeStep + 1) % composerFontSizes.length;
        composer.style.fontSize = composerFontSizes[fontSizeStep];
        statusFooter.textContent = `Composer size: ${composerFontSizes[fontSizeStep]}.`;
      });

      fmtEmoji.addEventListener("click", () => {
        const sym = "☺ ";
        const start = composer.selectionStart ?? composer.value.length;
        const end = composer.selectionEnd ?? composer.value.length;
        composer.value = composer.value.slice(0, start) + sym + composer.value.slice(end);
        const pos = start + sym.length;
        composer.focus();
        composer.setSelectionRange(pos, pos);
        statusFooter.textContent = "Inserted emoticon.";
      });

      fmtPalette.addEventListener("click", () => {
        paletteStep = (paletteStep + 1) % composerColors.length;
        const c = composerColors[paletteStep];
        composer.style.color = c === "var(--ink)" ? "#07279a" : c;
        statusFooter.textContent = `Composer color updated.`;
      });

      fmtVoiceClip.addEventListener("click", () => {
        addSysToActive("*Voice clip attached (demo).*");
        statusFooter.textContent = "Voice clip placeholder added to conversation.";
      });

      renderThreadList();
      setActive(activeId);
    </script>
  </body>
</html>
