<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You Really Forgot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Gochi+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      html,
      body.simple-page {
        height: 100%;
      }

      body.simple-page {
        font-family: "Gochi Hand", system-ui, sans-serif;
      }

      .simple-page .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 42px 18px;
      }

      .simple-page .card {
        width: min(520px, 92vw);
        border-radius: 0;
        border: 3px solid var(--ink);
        background: var(--paper);
        box-shadow: 0 10px 0 #07279a24;
        padding: 22px 18px;
        text-align: center;
      }

      .simple-page h1 {
        margin: 0 0 10px;
        font-family: "Caveat", cursive;
        font-weight: 700;
        font-size: clamp(1.85rem, 4.5vw, 2.5rem);
        color: var(--ink);
        letter-spacing: 0.01em;
      }

      .simple-page p {
        margin: 0 0 14px;
        color: var(--ink-soft);
        font-size: 14px;
        line-height: 1.5;
      }

      .simple-page .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-top: 10px;
      }

      .simple-page input {
        width: 100%;
        border: 2px solid var(--ink);
        background: #fbf8ee;
        color: var(--ink);
        padding: 11px 12px;
        border-radius: 12px;
        outline: none;
        font-weight: 700;
      }

      .simple-page input::placeholder {
        color: rgba(63, 79, 154, 0.55);
      }

      .simple-page input:focus {
        border-color: var(--pink);
        box-shadow: 0 0 0 2px rgba(213, 74, 169, 0.25);
      }

      .simple-page .btn {
        appearance: none;
        white-space: nowrap;
        padding: 0.58rem 1.1rem 0.64rem;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .simple-page .fine {
        margin-top: 12px;
        color: var(--ink-soft);
        font-size: 12px;
      }

      .simple-page .back {
        display: inline-block;
        margin-top: 18px;
        color: var(--ink);
        text-decoration: none;
        border-bottom: 2px solid rgba(7, 39, 154, 0.22);
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 11px;
      }
      .simple-page .back:hover {
        color: var(--pink);
        border-bottom-color: var(--pink);
      }
    </style>
  </head>
  <body class="simple-page">
    <main class="wrap" aria-label="Password reset">
      <section class="card">
        <h1>You Really Forgot?</h1>

        <form onsubmit="event.preventDefault(); window.location.href = './index.html';">
          <div class="row">
            <input type="email" placeholder="Email address" required />
            <button class="btn" type="submit">Send</button>
          </div>
          <div class="fine">Check your spam or memory.</div>
        </form>

        <a class="back" href="./index.html">Back</a>
      </section>
    </main>
  </body>
</html>
