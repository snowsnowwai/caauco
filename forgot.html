<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>You Really Forgot</title>
    <style>
      @font-face {
        font-family: "IEatCrayons";
        src: url("./Fonts/i-eat-crayons.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bg0: #0a1218;
        --bg1: #0b1b23;
        --stroke2: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.92);
        --muted2: rgba(255, 255, 255, 0.45);
        --blue: #38b6ff;
        --blue2: #2aa7f0;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      html {
        font-family: "IEatCrayons", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        letter-spacing: 0.1em;
      }

      button,
      input {
        font-family: inherit;
        letter-spacing: inherit;
      }

      body {
        margin: 0;
        color: var(--text);
        background: radial-gradient(
            1200px 600px at 35% 30%,
            rgba(56, 182, 255, 0.12),
            transparent 60%
          ),
          radial-gradient(900px 600px at 70% 65%, rgba(56, 182, 255, 0.08), transparent 55%),
          linear-gradient(180deg, var(--bg1), var(--bg0));
        overflow-x: hidden;
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 42px 18px;
      }

      .card {
        width: min(520px, 92vw);
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--stroke2);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 18px;
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        letter-spacing: 0.12em;
      }

      p {
        margin: 0 0 14px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        line-height: 1.5;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-top: 10px;
      }

      input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.92);
        padding: 11px 12px;
        border-radius: 10px;
        outline: none;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.52);
      }

      .btn {
        appearance: none;
        border: 0;
        cursor: pointer;
        border-radius: 10px;
        padding: 11px 12px;
        background: linear-gradient(180deg, var(--blue), var(--blue2));
        color: rgba(0, 0, 0, 0.75);
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 10px;
        white-space: nowrap;
      }

      .fine {
        margin-top: 10px;
        color: var(--muted2);
        font-size: 11px;
      }

      .back {
        display: inline-block;
        margin-top: 14px;
        color: rgba(255, 255, 255, 0.78);
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.18);
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-size: 11px;
      }
      .back:hover {
        color: rgba(56, 182, 255, 0.9);
        border-bottom-color: rgba(56, 182, 255, 0.45);
      }
    </style>
  </head>
  <body>
    <main class="wrap" aria-label="Password reset">
      <section class="card">
        <h1>You Really Forgot?</h1>

        <form onsubmit="event.preventDefault(); window.location.href = './index.html';">
          <div class="row">
            <input type="email" placeholder="Email address" required />
            <button class="btn" type="submit">Send</button>
          </div>
          <div class="fine">Check your spam or memory.</div>
        </form>

        <a class="back" href="./index.html">Back</a>
      </section>
    </main>
  </body>
</html>
