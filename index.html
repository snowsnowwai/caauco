<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In / Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Matemasie&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      html,
      body.auth-page {
        height: 100%;
      }

      body.auth-page {
        background: #ece4ff;
        font-family: "Gochi Hand", system-ui, sans-serif;
      }

      .auth-page .page {
        min-height: 100%;
        position: relative;
      }

      .auth-page .top-right {
        position: fixed;
        top: 22px;
        right: 22px;
        z-index: 10;
      }

      .auth-page .pill {
        border-radius: 999px;
        padding: 0.58rem 1rem 0.64rem;
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        box-shadow: 0 10px 0 #07279a24;
      }

      .auth-page .center {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 96px 18px 40px;
      }

      .auth-page .auth {
        width: min(420px, 92vw);
        text-align: center;
      }

      .auth-page .title {
        margin: 0 0 14px;
        font-family: "Matemasie", system-ui, sans-serif;
        font-weight: 400;
        font-size: clamp(1.85rem, 4.5vw, 2.5rem);
        color: var(--ink);
        letter-spacing: 0.01em;
        text-transform: none;
      }

      .auth-page .card {
        margin: 0 auto;
        padding: 16px;
        border-radius: 0;
        border: 3px solid var(--ink);
        background: var(--paper);
        box-shadow: 0 10px 0 #07279a24;
      }

      .auth-page .stack {
        display: grid;
        gap: 10px;
      }

      .auth-page .field {
        position: relative;
        background: #fbf8ee;
        border: 2px solid var(--ink);
        border-radius: 12px;
        overflow: hidden;
        transition: border-color 0.14s ease, box-shadow 0.14s ease;
      }
      .auth-page .field:focus-within {
        border-color: var(--pink);
        box-shadow: 0 0 0 2px rgba(213, 74, 169, 0.25);
      }

      .auth-page .field input {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--ink);
        padding: 11px 12px;
        font-size: 13px;
        outline: none;
      }
      .auth-page .field input::placeholder {
        color: rgba(63, 79, 154, 0.55);
      }

      .auth-page button.inline-action {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        appearance: none;
        margin: 0;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.14em;
        color: var(--ink-soft);
        text-transform: uppercase;
        border: 0;
        background: transparent;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 8px;
        box-shadow: none;
      }
      .auth-page button.inline-action:hover {
        color: var(--ink);
        background: rgba(213, 74, 169, 0.12);
        transform: translateY(-50%);
      }

      .auth-page .primary-btn {
        width: 100%;
        margin-top: 2px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.72rem;
      }

      .auth-page .divider {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
        margin: 10px 0 6px;
        color: var(--ink-soft);
        font-size: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      .auth-page .divider::before,
      .auth-page .divider::after {
        content: "";
        height: 2px;
        background: rgba(7, 39, 154, 0.18);
        border-radius: 1px;
      }

      .auth-page .social {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 6px;
      }

      .auth-page .social button {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.68rem;
        padding: 0.65rem 0.5rem;
      }

      .auth-page .icon {
        width: 14px;
        height: 14px;
        display: block;
      }

      .auth-page .fineprint {
        margin: 14px auto 0;
        max-width: 360px;
        color: var(--ink-soft);
        font-size: 11px;
        line-height: 1.45;
      }
      .auth-page .fineprint a {
        color: var(--ink);
        text-decoration: none;
        border-bottom: 2px solid rgba(7, 39, 154, 0.22);
      }
      .auth-page .fineprint a:hover {
        color: var(--pink);
        border-bottom-color: var(--pink);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 420px) {
        .auth-page .social {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="auth-page">
    <div class="page">
      <div class="top-right">
        <button class="pill" id="toggleMode" type="button" aria-controls="signin signup">
          SIGN UP
        </button>
      </div>

      <main class="center" aria-label="Authentication">
        <section class="auth">
          <h1 class="sr-only">Authentication</h1>

          <div id="signin" role="region" aria-label="Sign in">
            <div class="title">Log In</div>
            <div class="card">
              <form class="stack" id="signinForm" novalidate>
                <label class="field">
                  <span class="sr-only">Email OR Username</span>
                  <input
                    autocomplete="username"
                    inputmode="email"
                    name="identifier"
                    placeholder="Email or username"
                    required
                    type="text"
                  />
                </label>

                <label class="field">
                  <span class="sr-only">Password</span>
                  <input
                    autocomplete="current-password"
                    name="password"
                    placeholder="Password"
                    required
                    type="password"
                  />
                  <button class="inline-action" type="button" id="forgotBtn">YOU REALLY FORGOT???</button>
                </label>

                <button class="primary-btn" type="submit">Log In</button>
              </form>
            </div>

            <p class="fineprint">
              
              This site is protected by reCAPTCHA and Google.
              <br/>By signing in you agree to our <a href="./terms.html">Terms Of Service</a> and
              <a href="./privacy.html">Privacy Policy</a>.
            </p>
          </div>

          <div id="signup" class="hidden" role="region" aria-label="Sign up">
            <div class="title">Sign Up</div>
            <div class="card">
              <form class="stack" id="signupForm" novalidate>
                <label class="field">
                  <span class="sr-only">Email</span>
                  <input
                    autocomplete="email"
                    inputmode="email"
                    name="email"
                    placeholder="Email"
                    required
                    type="email"
                  />
                </label>

                <label class="field">
                  <span class="sr-only">Username</span>
                  <input
                    autocomplete="username"
                    name="username"
                    placeholder="Username"
                    required
                    type="text"
                  />
                </label>

                <label class="field">
                  <span class="sr-only">Password</span>
                  <input
                    autocomplete="new-password"
                    name="newPassword"
                    placeholder="Password"
                    required
                    type="password"
                  />
                  <button class="inline-action" type="button" id="showPwBtn">SHOW</button>
                </label>

                <button class="primary-btn" type="submit">Create Account</button>
              </form>
            </div>

            <p class="fineprint">
              By creating an account you agree to our <a href="./terms.html">Terms Of Service</a> and
              <a href="./privacy.html">Privacy Policy</a>.
            </p>
          </div>
        </section>
      </main>
    </div>

    <script>
      const el = (id) => document.getElementById(id);

      const toggleBtn = el("toggleMode");
      const signin = el("signin");
      const signup = el("signup");

      const setMode = (mode) => {
        const isSignup = mode === "signup";
        signup.classList.toggle("hidden", !isSignup);
        signin.classList.toggle("hidden", isSignup);
        toggleBtn.textContent = isSignup ? "SIGN IN" : "SIGN UP";
        toggleBtn.setAttribute("aria-label", isSignup ? "Switch to sign in" : "Switch to sign up");
      };

      toggleBtn.addEventListener("click", () => {
        const showingSignup = !signup.classList.contains("hidden");
        setMode(showingSignup ? "signin" : "signup");
      });

      el("forgotBtn").addEventListener("click", () => {
        window.location.href = "./forgot.html";
      });

      const pw = () => signup.querySelector('input[name="newPassword"]');
      el("showPwBtn").addEventListener("click", () => {
        const input = pw();
        const next = input.type === "password" ? "text" : "password";
        input.type = next;
        el("showPwBtn").textContent = next === "password" ? "SHOW" : "HIDE";
      });

      const wireForm = (formId) => {
        const form = el(formId);
        form.addEventListener("submit", (e) => {
          e.preventDefault();

          if (formId === "signupForm") {
            const email = form.querySelector('input[name="email"]');
            const v = (email?.value ?? "").trim();
            const isGmail = /@gmail\.com$/i.test(v);
            email.setCustomValidity(isGmail ? "" : "Please use an email address that ends with @gmail.com.");
          }

          if (!form.checkValidity()) {
            form.reportValidity();
            return;
          }
          if (formId === "signinForm") {
            window.location.href = "./MatchPreviewPage.html";
            return;
          }
          window.location.href = "./personalization.html";
        });
      };

      wireForm("signinForm");
      wireForm("signupForm");

      setMode("signin");
    </script>
  </body>
</html>
