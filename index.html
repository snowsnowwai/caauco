<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Sign in / Sign up</title>
    <style>
      :root {
        --bg0: #0a1218;
        --bg1: #0b1b23;
        --card: rgba(10, 18, 24, 0.35);
        --card2: rgba(255, 255, 255, 0.06);
        --stroke: rgba(255, 255, 255, 0.12);
        --stroke2: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
        --muted2: rgba(255, 255, 255, 0.45);
        --blue: #38b6ff;
        --blue2: #2aa7f0;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 35% 30%, rgba(56, 182, 255, 0.12), transparent 60%),
          radial-gradient(900px 600px at 70% 65%, rgba(56, 182, 255, 0.08), transparent 55%),
          linear-gradient(180deg, var(--bg1), var(--bg0));
        overflow-x: hidden;
      }

      .page {
        min-height: 100%;
        position: relative;
      }

      .top-right {
        position: fixed;
        top: 22px;
        right: 22px;
        z-index: 10;
      }

      .pill {
        appearance: none;
        border: 1px solid var(--stroke);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.84);
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 0.06em;
        font-size: 12px;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }
      .pill:hover {
        transform: translateY(-1px);
        border-color: rgba(56, 182, 255, 0.35);
        background: rgba(56, 182, 255, 0.06);
      }
      .pill:focus-visible {
        outline: 2px solid rgba(56, 182, 255, 0.7);
        outline-offset: 3px;
      }

      .center {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 96px 18px 40px;
      }

      .auth {
        width: min(420px, 92vw);
        text-align: center;
      }

      .title {
        margin: 0 0 14px;
        font-size: 16px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.86);
        letter-spacing: 0.01em;
      }

      .card {
        margin: 0 auto;
        padding: 14px;
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--stroke2);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .field {
        position: relative;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 10px;
        overflow: hidden;
        transition: border-color 120ms ease, background 120ms ease;
      }
      .field:focus-within {
        border-color: rgba(56, 182, 255, 0.55);
        background: rgba(56, 182, 255, 0.06);
      }

      .field input {
        width: 100%;
        border: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.92);
        padding: 11px 12px;
        font-size: 13px;
        outline: none;
      }
      .field input::placeholder {
        color: rgba(255, 255, 255, 0.52);
      }

      .inline-action {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.32);
        text-transform: uppercase;
        border: 0;
        background: transparent;
        cursor: pointer;
        padding: 6px 6px;
      }
      .inline-action:hover {
        color: rgba(255, 255, 255, 0.55);
      }
      .inline-action:focus-visible {
        outline: 2px solid rgba(56, 182, 255, 0.7);
        outline-offset: 3px;
        border-radius: 8px;
      }

      .primary {
        appearance: none;
        border: 0;
        cursor: pointer;
        border-radius: 10px;
        padding: 11px 12px;
        width: 100%;
        background: linear-gradient(180deg, var(--blue), var(--blue2));
        color: rgba(0, 0, 0, 0.75);
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 10px;
        box-shadow: 0 16px 40px rgba(56, 182, 255, 0.16);
        transition: transform 120ms ease, filter 120ms ease;
      }
      .primary:hover {
        transform: translateY(-1px);
        filter: saturate(1.05) brightness(1.03);
      }
      .primary:active {
        transform: translateY(0px);
      }
      .primary:focus-visible {
        outline: 2px solid rgba(56, 182, 255, 0.75);
        outline-offset: 3px;
      }

      .divider {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
        margin: 10px 0 6px;
        color: rgba(255, 255, 255, 0.28);
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        background: rgba(255, 255, 255, 0.10);
      }

      .social {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 6px;
      }

      .social button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.82);
        border-radius: 10px;
        padding: 10px 10px;
        cursor: pointer;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }
      .social button:hover {
        transform: translateY(-1px);
        border-color: rgba(56, 182, 255, 0.25);
        background: rgba(56, 182, 255, 0.05);
      }
      .social button:focus-visible {
        outline: 2px solid rgba(56, 182, 255, 0.7);
        outline-offset: 3px;
      }

      .icon {
        width: 14px;
        height: 14px;
        display: block;
      }

      .fineprint {
        margin: 14px auto 0;
        max-width: 360px;
        color: rgba(255, 255, 255, 0.28);
        font-size: 10px;
        line-height: 1.45;
      }
      .fineprint a {
        color: rgba(255, 255, 255, 0.42);
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      }
      .fineprint a:hover {
        color: rgba(56, 182, 255, 0.8);
        border-bottom-color: rgba(56, 182, 255, 0.45);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 420px) {
        .social {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="top-right">
        <button class="pill" id="toggleMode" type="button" aria-controls="signin signup">
          SIGN UP
        </button>
      </div>

      <main class="center" aria-label="Authentication">
        <section class="auth">
          <h1 class="sr-only">Authentication</h1>

          <div id="signin" role="region" aria-label="Sign in">
            <div class="title">Log in</div>
            <div class="card">
              <form class="stack" id="signinForm" novalidate>
                <label class="field">
                  <span class="sr-only">Email or username</span>
                  <input
                    autocomplete="username"
                    inputmode="email"
                    name="identifier"
                    placeholder="Email or username"
                    required
                    type="text"
                  />
                </label>

                <label class="field">
                  <span class="sr-only">Password</span>
                  <input
                    autocomplete="current-password"
                    name="password"
                    placeholder="Password"
                    required
                    type="password"
                  />
                  <button class="inline-action" type="button" id="forgotBtn">FORGOT?</button>
                </label>

                <button class="primary" type="submit">LOG IN</button>
              </form>
            </div>

            <p class="fineprint">
              By signing in you agree to our <a href="#" onclick="return false;">Terms</a> and
              <a href="#" onclick="return false;">Privacy Policy</a>.<br />
              This site is protected by reCAPTCHA and the Google
              <a href="#" onclick="return false;">Privacy Policy</a> and
              <a href="#" onclick="return false;">Terms of Service</a> apply.
            </p>
          </div>

          <div id="signup" class="hidden" role="region" aria-label="Sign up">
            <div class="title">Sign up</div>
            <div class="card">
              <form class="stack" id="signupForm" novalidate>
                <label class="field">
                  <span class="sr-only">Email</span>
                  <input
                    autocomplete="email"
                    inputmode="email"
                    name="email"
                    placeholder="Email"
                    required
                    type="email"
                  />
                </label>

                <label class="field">
                  <span class="sr-only">Username</span>
                  <input
                    autocomplete="username"
                    name="username"
                    placeholder="Username"
                    required
                    type="text"
                  />
                </label>

                <label class="field">
                  <span class="sr-only">Password</span>
                  <input
                    autocomplete="new-password"
                    name="newPassword"
                    placeholder="Password"
                    required
                    type="password"
                  />
                  <button class="inline-action" type="button" id="showPwBtn">SHOW</button>
                </label>

                <button class="primary" type="submit">CREATE ACCOUNT</button>
              </form>
            </div>

            <p class="fineprint">
              By creating an account you agree to our <a href="#" onclick="return false;">Terms</a> and
              <a href="#" onclick="return false;">Privacy Policy</a>.
            </p>
          </div>
        </section>
      </main>
    </div>

    <script>
      const el = (id) => document.getElementById(id);

      const toggleBtn = el("toggleMode");
      const signin = el("signin");
      const signup = el("signup");

      const setMode = (mode) => {
        const isSignup = mode === "signup";
        signup.classList.toggle("hidden", !isSignup);
        signin.classList.toggle("hidden", isSignup);
        toggleBtn.textContent = isSignup ? "SIGN IN" : "SIGN UP";
        toggleBtn.setAttribute("aria-label", isSignup ? "Switch to sign in" : "Switch to sign up");
      };

      toggleBtn.addEventListener("click", () => {
        const showingSignup = !signup.classList.contains("hidden");
        setMode(showingSignup ? "signin" : "signup");
      });

      el("forgotBtn").addEventListener("click", () => {
        alert("Password reset flow goes here.");
      });

      const pw = () => signup.querySelector('input[name="newPassword"]');
      el("showPwBtn").addEventListener("click", () => {
        const input = pw();
        const next = input.type === "password" ? "text" : "password";
        input.type = next;
        el("showPwBtn").textContent = next === "password" ? "SHOW" : "HIDE";
      });

      const wireForm = (formId) => {
        const form = el(formId);
        form.addEventListener("submit", (e) => {
          e.preventDefault();

          if (formId === "signupForm") {
            const email = form.querySelector('input[name="email"]');
            const v = (email?.value ?? "").trim();
            const isGmail = /@gmail\.com$/i.test(v);
            email.setCustomValidity(isGmail ? "" : "Please use an email address that ends with @gmail.com.");
          }

          if (!form.checkValidity()) {
            form.reportValidity();
            return;
          }
          if (formId === "signinForm") {
            window.location.href = "./MatchPreviewPage.html";
            return;
          }
          window.location.href = "./personalization.html";
        });
      };

      wireForm("signinForm");
      wireForm("signupForm");

      setMode("signin");
    </script>
  </body>
</html>
